<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mega Questões - Estudo Inteligente</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        body{ font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; background:#f4f6f9; margin:0; padding:0; }
        header{ background:#1e3a8a; color:white; padding:15px; text-align:center; font-size:22px; font-weight:bold; }
        nav{ display:flex; justify-content:center; background:#0f172a; }
        nav button{ padding:12px 20px; background:none; border:none; color:white; cursor:pointer; font-weight:bold; }
        nav button:hover{ background:#1e293b; }
        .section{ display:none; padding:20px; }
        .active{ display:block; }
        .card{ background:white; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); margin-bottom:20px; }
        button{ padding:10px 15px; margin-top:10px; cursor:pointer; border:none; border-radius:6px; background:#2563eb; color:white; font-weight: bold; }
        button:hover{ background:#1d4ed8; }
        .btn-danger { background: #dc2626; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-save { background: #16a34a; }
        .btn-save:hover { background: #15803d; }
        .option{ margin:8px 0; padding:12px; background:#f9f9f9; border-radius:5px; cursor:pointer; border: 1px solid #ddd; transition: 0.2s; }
        .option:hover{ background:#f0f0f0; border-color: #2563eb; }
        .correct{ background:#dcfce7 !important; border-color:#22c55e !important; color: #166534; font-weight:bold; }
        .wrong{ background:#fee2e2 !important; border-color:#ef4444 !important; color: #991b1b; font-weight:bold; }
        #loading{ display:none; color:#2563eb; font-weight:bold; margin-top:10px; }
        .resumo-lista { background: #fff7ed; padding: 15px; border-radius: 8px; border-left: 5px solid #f97316; margin-top: 10px; }
    </style>
</head>
<body>

<header>Mega Questões - Estudo Inteligente</header>

<nav>
    <button onclick="showSection('questoes')">Questões</button>
    <button onclick="showSection('upload')">Importar PDF</button>
    <button onclick="showSection('feedback')">Feedback</button>
</nav>

<div id="questoes" class="section active">
    <div class="card">
        <h3>Questão Inédita</h3>
        <div id="questionText">Importe um PDF para começar.</div>
        <div id="options"></div>
        <div id="explanation" style="margin-top:15px; font-weight:bold; color: #1e3a8a;"></div>
    </div>
</div>

<div id="upload" class="section">
    <div class="card">
        <h3>Importar PDF</h3>
        <input type="file" id="pdfFile" accept="application/pdf">
        <button onclick="processarPDF()">Analisar e Criar Questões</button>
        <div id="loading">⏳ IA Analisando conteúdo... Aguarde.</div>
    </div>
</div>

<div id="feedback" class="section">
    <div class="card">
        <h3>📊 Relatório de Desempenho</h3>
        <div id="feedbackContent">Aguardando dados...</div>
        <button onclick="generateFeedback()">Atualizar Dados</button>
        <button class="btn-save" onclick="salvarFeedback()">💾 Baixar Resumo (.txt)</button>
        <button class="btn-danger" onclick="limparTudo()">🗑️ Limpar Treino do Dia</button>
    </div>
</div>

<script>
const API_KEY = "AIzaSyB14BAB9dfBzwTWRrmLITygiVJhbbJH3A0";
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

// Carrega os dados salvos ou inicia novos
let stats = JSON.parse(localStorage.getItem("stats")) || { total:0, correct:0, wrong:0, erros_detalhes: [] };
let bancoDeQuestoes = [];

function showSection(id){
    document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

async function processarPDF() {
    const file = document.getElementById('pdfFile').files[0];
    if (!file) return alert("Selecione um PDF.");
    document.getElementById('loading').style.display = 'block';

    try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        let fullText = "";
        for (let i = 1; i <= Math.min(pdf.numPages, 2); i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            fullText += content.items.map(s => s.str).join(" ");
        }

        const prompt = `Atue como banca de concurso. Crie 3 questões de múltipla escolha (A-E) baseadas neste texto. Responda APENAS um JSON: [{"p":"pergunta","opts":["A","B","C","D","E"],"c":0,"exp":"explicação do porquê ser essa a correta"}]. Texto: ${fullText.substring(0, 3000)}`;

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });

        const data = await response.json();
        const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
        bancoDeQuestoes = JSON.parse(jsonText);
        
        document.getElementById('loading').style.display = 'none';
        showSection('questoes');
        displayQuestion(0);
    } catch (e) {
        alert("Erro na IA: Verifique sua internet ou arquivo.");
        document.getElementById('loading').style.display = 'none';
    }
}

function displayQuestion(index) {
    if (!bancoDeQuestoes[index]) return;
    const q = bancoDeQuestoes[index];
    document.getElementById("questionText").innerHTML = `<strong>${index + 1}.</strong> ${q.p}`;
    document.getElementById("explanation").innerHTML = "";
    let html = "";
    q.opts.forEach((opt, i) => {
        html += `<div class="option" onclick="validateAnswer(this, ${i}, ${q.c}, '${q.exp.replace(/'/g, "\\'")}')">${opt}</div>`;
    });
    if (index < bancoDeQuestoes.length - 1) {
        html += `<button onclick="displayQuestion(${index + 1})">Próxima Questão ➔</button>`;
    }
    document.getElementById("options").innerHTML = html;
}

function validateAnswer(el, selected, correct, exp) {
    if (el.parentElement.classList.contains('locked')) return;
    stats.total++;
    if (selected === correct) {
        el.classList.add('correct');
        stats.correct++;
    } else {
        el.classList.add('wrong');
        stats.wrong++;
        // Salva o erro para o resumo
        stats.erros_detalhes.push(`Assunto: ${document.getElementById("questionText").innerText.substring(0,50)}... | Resumo: ${exp}`);
    }
    document.getElementById("explanation").innerHTML = "💡 " + exp;
    el.parentElement.classList.add('locked');
    localStorage.setItem("stats", JSON.stringify(stats));
}

function generateFeedback() {
    let p = stats.total > 0 ? ((stats.correct/stats.total)*100).toFixed(1) : 0;
    let html = `<h3>Desempenho Geral: ${p}%</h3>
                <p>Respondidas: ${stats.total} | Acertos: ${stats.correct} | Erros: ${stats.wrong}</p>
                <h4>📝 Resumo Estruturado de Erros:</h4>`;
    
    if (stats.erros_detalhes.length === 0) {
        html += "<p>Nenhum erro registrado ainda. Continue praticando!</p>";
    } else {
        html += "<div class='resumo-lista'><ul>" + stats.erros_detalhes.map(e => `<li>${e}</li>`).join("<br>") + "</ul></div>";
    }
    document.getElementById("feedbackContent").innerHTML = html;
}

function salvarFeedback() {
    if (stats.erros_detalhes.length === 0) return alert("Não há resumo para salvar.");
    const texto = "MEU RESUMO DE ESTUDOS\n\n" + stats.erros_detalhes.join("\n\n");
    const blob = new Blob([texto], { type: "text/plain" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "meu_feedback_estudos.txt";
    a.click();
}

function limparTudo() {
    if (confirm("Deseja zerar os acertos e erros do dia? O resumo de estudo também será apagado.")) {
        stats = { total:0, correct:0, wrong:0, erros_detalhes: [] };
        localStorage.removeItem("stats");
        generateFeedback();
        document.getElementById("questionText").innerHTML = "Importe um PDF para começar.";
        document.getElementById("options").innerHTML = "";
        alert("Tudo limpo! Bons estudos.");
    }
}
</script>
</body>
</html>
